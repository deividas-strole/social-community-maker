spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:socialcommunitymaker}?sslmode=${POSTGRES_SSLMODE:disable}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=86400000

server.port=${PORT:8080}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}